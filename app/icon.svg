  <line x1="9"  y1="20" x2="14" y2="9"  stroke-width="1.6" stroke-linecap="round" class="stroke"/>
  <line x1="19" y1="20" x2="14" y2="9"  stroke-width="1.6" stroke-linecap="round" class="stroke"/>
